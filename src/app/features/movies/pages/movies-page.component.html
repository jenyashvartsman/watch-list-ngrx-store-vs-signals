<div class="movies-page">
  <header class="movies-page__header">
    <h1 class="movies-page__title">Movies</h1>
    <div class="movies-page__controls">
      <app-movies-filter
        [filters]="moviesStore.filters()"
        (filtersChange)="onFiltersChange($event)"
      />
      <button class="movies-page__add-btn" type="button" (click)="openDrawer()">+ Add Movie</button>
    </div>
  </header>

  <main class="movies-page__content">
    @if (moviesStore.isLoading()) {
      <div class="movies-page__loading" aria-live="polite" aria-busy="true">
        <div class="movies-page__spinner" aria-hidden="true"></div>
        <p>Loading movies…</p>
      </div>
    } @else if (moviesStore.error()) {
      <app-movies-error [message]="moviesStore.error()!" />
    } @else {
      <app-movies-grid
        [movies]="moviesStore.filteredMovies()"
        [filtersApplied]="moviesStore.hasActiveFilters()"
      />
    }
  </main>

  <app-movie-add-drawer
    [isOpen]="isDrawerOpen()"
    [isSaving]="moviesStore.isSaving()"
    (closed)="closeDrawer()"
    (submitted)="onMovieSubmit($event)"
  />
</div>
