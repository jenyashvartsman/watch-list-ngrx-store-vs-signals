<ui-dialog title="Delete Show" [isOpen]="show() !== null" (closed)="closed.emit()">
  @if (show(); as s) {
    <div class="tv-shows-delete-confirm-dialog__body">
      <p class="tv-shows-delete-confirm-dialog__message">
        Are you sure you want to remove
        <strong class="tv-shows-delete-confirm-dialog__show-title">{{ s.title }}</strong>
        from your watch list?
      </p>
    </div>

    <footer class="tv-shows-delete-confirm-dialog__footer">
      <button
        class="tv-shows-delete-confirm-dialog__btn tv-shows-delete-confirm-dialog__btn--cancel"
        type="button"
        (click)="closed.emit()"
      >
        Cancel
      </button>
      <button
        class="tv-shows-delete-confirm-dialog__btn tv-shows-delete-confirm-dialog__btn--delete"
        type="button"
        [disabled]="isSaving()"
        [attr.aria-busy]="isSaving()"
        (click)="confirmed.emit()"
      >
        @if (isSaving()) { Deleting… } @else { Delete }
      </button>
    </footer>
  }
</ui-dialog>
