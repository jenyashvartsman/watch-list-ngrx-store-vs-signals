<div
  class="drawer"
  [class.drawer--open]="isOpen()"
  role="dialog"
  aria-modal="true"
  [attr.aria-labelledby]="titleId"
  (keydown.escape)="onClose()"
>
  <div class="drawer__backdrop" (click)="onClose()" aria-hidden="true"></div>

  <aside class="drawer__panel" #panel tabindex="-1">
    <header class="drawer__header">
      <h2 class="drawer__title" [id]="titleId">{{ title() }}</h2>
      <button
        class="drawer__close"
        type="button"
        (click)="onClose()"
        aria-label="Close drawer"
      >
        &times;
      </button>
    </header>

    <ng-content />
  </aside>
</div>
